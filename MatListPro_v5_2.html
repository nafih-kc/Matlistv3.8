[data-theme="dark"] .card,[data-theme="dark"] .pcard,[data-theme="dark"] .litem,[data-theme="dark"] .sitem,[data-theme="dark"] .setgroup,[data-theme="dark"] .aform,[data-theme="dark"] .cbox{background:var(--white);}
[data-theme="dark"] .sheet{background:#2C2C2E;}
[data-theme="dark"] .inp,[data-theme="dark"] .sel,[data-theme="dark"] .minp,[data-theme="dark"] .cinp{background:#2C2C2E;color:var(--text);}
[data-theme="dark"] .btn-outline{background:var(--white);color:var(--text2);}
[data-theme="dark"] .sinput{background:#1C1C1E;color:var(--text);}
[data-theme="dark"] .overlay{background:rgba(0,0,0,0.7);}
[data-theme="dark"] .github-card{background:linear-gradient(135deg,#000,#0D1117);}
[data-theme="dark"] .add-proj{background:var(--white);}
[data-theme="dark"] .qchip{background:var(--white);}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(21,101,192,0.28);position:sticky;top:0;z-index:200;transition:background 0.3s;}
.hlogo{width:36px;height:36px;background:rgba(255,255,255,0.18);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.htitle{font-size:17px;font-weight:900;color:#fff;}
.hsub{font-size:10px;color:rgba(255,255,255,0.72);margin-top:1px;}
.hbadge{margin-left:auto;font-size:11px;background:rgba(255,255,255,0.18);border-radius:20px;padding:4px 11px;color:#fff;font-weight:700;}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.92);border-top:1px solid rgba(212,220,240,0.6);display:flex;z-index:200;box-shadow:0 -2px 20px rgba(21,101,192,0.08);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding-bottom:env(safe-area-inset-bottom,0px);}
.nbtn{flex:1;padding:8px 0 6px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;cursor:pointer;position:relative;transition:color 0.18s;}
.nbtn.active{color:var(--blue);}
.nbtn .nicon-wrap{width:34px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.nbtn.active .nicon-wrap{background:var(--blue-light);}
.nicon{font-size:22px;line-height:1;display:block;}
.nbadge{position:absolute;top:4px;right:16%;background:var(--red);color:#fff;font-size:9px;font-weight:900;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center;}

/* ── LAYOUT ── */
.content{padding:14px 14px 86px;}
.card{background:var(--white);border-radius:var(--radius);padding:15px;border:1px solid var(--border);margin-bottom:12px;box-shadow:var(--shadow);}
.ctitle{font-size:11px;font-weight:800;color:var(--blue);margin-bottom:11px;text-transform:uppercase;letter-spacing:0.8px;}
.row{display:flex;align-items:center;gap:10px;}
.col{display:flex;flex-direction:column;gap:5px;}

/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;border-radius:var(--radius2);transition:opacity 0.15s;}
.btn:active{opacity:0.85;}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;box-shadow:0 4px 14px rgba(21,101,192,0.32);}
.btn-outline{background:var(--white);color:var(--text2);border:2px solid var(--border2)!important;}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;box-shadow:0 3px 10px rgba(27,127,79,0.28);}
.btn-red{background:var(--red-light);color:var(--red);}
.btn-ghost{background:var(--bg2);color:var(--blue);border:1.5px solid var(--blue-mid)!important;}
.btn-sm{font-size:12px;padding:8px 14px;}
.btn-md{font-size:14px;padding:11px 18px;}
.btn-lg{font-size:15px;padding:13px 20px;width:100%;}
.btn-xl{font-size:16px;padding:15px 20px;width:100%;}
.btn-icon{width:34px;height:34px;border-radius:9px;font-size:15px;flex-shrink:0;}

/* ── INPUTS ── */
.inp{width:100%;padding:11px 13px;border-radius:var(--radius2);border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:16px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;outline:none;transition:border 0.2s;}
.inp:focus{border-color:var(--blue);}
.inp::placeholder{color:var(--muted);font-size:14px;}
.sel{width:100%;padding:11px 13px;border-radius:var(--radius2);border:1.5px solid var(--border2);background:var(--white);color:var(--text);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;outline:none;}
.flabel{font-size:11px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:0.4px;}
.fgroup{display:flex;flex-direction:column;gap:4px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fgrid .full{grid-column:1/-1;}

/* ── PROJECT CARDS ── */
.pcard{background:var(--white);border-radius:var(--radius);padding:16px;border:2px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:13px;cursor:pointer;margin-bottom:10px;transition:border-color 0.2s,background 0.2s;}
.pcard:active{transform:scale(0.985);}
.pcard.done{background:var(--green-light);border-color:var(--green-mid);}
.pemoji{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.pname{font-weight:800;font-size:15px;}
.pmeta{font-size:12px;color:var(--muted);margin-top:3px;}
.pchip{font-size:10px;border-radius:20px;padding:3px 10px;font-weight:800;color:#fff;white-space:nowrap;}
.add-proj{background:var(--white);border:2px dashed var(--blue-mid);border-radius:var(--radius);padding:15px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;color:var(--blue);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;width:100%;transition:background 0.15s;}
.add-proj:active{background:var(--blue-light);}

/* ── PROJECT COLORS ── */
.pc-blue{background:#E3F2FD;}.pc-green{background:#E8F5E9;}.pc-orange{background:#FFF3E0;}.pc-red{background:#FFEBEE;}.pc-purple{background:#F3E5F5;}.pc-teal{background:#E0F2F1;}
.pcc-blue{background:var(--blue);}.pcc-green{background:var(--green);}.pcc-orange{background:#E65100;}.pcc-red{background:var(--red);}.pcc-purple{background:#6A1B9A;}.pcc-teal{background:#00695C;}

/* ── LIST ITEMS ── */
.litem{background:var(--white);border-radius:var(--radius);border:1.5px solid var(--border);margin-bottom:9px;box-shadow:var(--shadow);overflow:hidden;animation:fadeUp 0.22s ease;}
.litem.purchased{opacity:0.6;border-color:var(--green-mid);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ltop{display:flex;align-items:center;gap:11px;padding:12px 13px;}
.limg{width:50px;height:50px;border-radius:11px;background:var(--blue-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.limg svg{width:34px;height:34px;}
.lname{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lbrand{font-size:12px;color:var(--muted);margin-top:2px;}
.lprice{display:inline-block;background:var(--blue-light);color:var(--blue);font-size:11px;font-weight:800;border-radius:5px;padding:2px 7px;margin-left:5px;}
.lqty{display:flex;align-items:center;background:var(--bg2);border-radius:9px;border:1.5px solid var(--border);overflow:hidden;flex-shrink:0;}
.qbtn{width:32px;height:32px;border:none;background:none;cursor:pointer;font-size:19px;color:var(--blue);font-weight:900;display:flex;align-items:center;justify-content:center;}
.qbtn:active{background:var(--blue-mid);}
.qnum{min-width:30px;text-align:center;font-weight:800;font-size:14px;}
.lbot{padding:0 13px 11px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.chip{font-size:11px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:2px 9px;font-weight:700;color:var(--text2);}
.chip.g{background:var(--green-light);color:var(--green);border-color:var(--green-mid);}
.chip.o{background:var(--orange-light);color:var(--orange);border-color:#FFCC80;}
.chip.purchased-chip{background:var(--green);color:#fff;border:none;}
.lnotes{font-size:11px;color:var(--muted);font-style:italic;}
.lactions{display:flex;gap:6px;margin-left:auto;flex-shrink:0;}

/* ── SEARCH ── */
.swrap{position:relative;margin-bottom:12px;}
.sinput{width:100%;padding:12px 38px 12px 42px;border-radius:var(--radius2);border:2px solid var(--border2);background:var(--white);color:var(--text);font-size:16px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;outline:none;transition:border 0.2s;box-shadow:var(--shadow);}
.sinput:focus{border-color:var(--blue);}
.sinput::placeholder{color:var(--muted);}
.sicon{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;}
.sclear{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;line-height:1;}

/* ── SUGGESTIONS ── */
.sitem{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;cursor:pointer;margin-bottom:5px;background:var(--white);border:1.5px solid var(--border);box-shadow:var(--shadow);transition:transform 0.12s;}
.sitem:active{transform:scale(0.98);}
.sitem.pop{border-color:var(--blue);background:var(--blue-light);}
.sitem.freq{border-color:#6A1B9A;background:#F3E5F5;}
.simg{width:42px;height:42px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.simg svg{width:30px;height:30px;}
.sitem.pop .simg{background:#DDEEFF;}
.sbrand{font-weight:800;font-size:14px;}
.scat{font-size:12px;color:var(--muted);margin-top:1px;}
.sprice{font-size:12px;font-weight:800;color:var(--blue);text-align:right;}
.sbadge{font-size:9px;border-radius:4px;padding:2px 6px;font-weight:800;color:#fff;display:inline-block;margin-top:3px;}

/* ── ADD FORM ── */
.aform{background:var(--white);border-radius:var(--radius);padding:16px;border:2px solid var(--blue);box-shadow:var(--shadow2);margin-top:12px;}
.aform-hdr{display:flex;align-items:center;gap:12px;margin-bottom:15px;}
.aform-img{width:54px;height:54px;border-radius:12px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.aform-img svg{width:38px;height:38px;}
.aform-brand{font-weight:900;font-size:16px;}
.aform-item{font-size:12px;color:var(--muted);margin-top:2px;}

/* ── QTY PICKER (add form) ── */
.qty-picker{display:flex;align-items:center;gap:0;background:var(--bg2);border-radius:10px;border:1.5px solid var(--border2);overflow:hidden;width:100%;}
.qty-picker .qbtn{flex:1;height:44px;font-size:22px;}
.qty-picker .qnum{flex:2;font-size:18px;font-weight:900;text-align:center;}

/* ── CUSTOM ENTRY ── */
.cbox{background:var(--blue-light);border:2px dashed var(--blue-mid);border-radius:var(--radius2);padding:13px;margin-bottom:10px;}
.cbox-title{font-size:11px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:9px;}
.crow{display:flex;gap:8px;margin-bottom:8px;}
.cinp{flex:1;padding:10px 12px;border-radius:9px;border:1.5px solid var(--border2);background:var(--white);color:var(--text);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;outline:none;}
.cinp:focus{border-color:var(--blue);}
.saved-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:var(--white);border:1.5px solid var(--blue-mid);font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;margin:3px;}
.saved-chip:active{background:var(--blue-light);}

/* ── SUMMARY ── */
.sumbox{background:var(--blue-light);border:1.5px solid var(--blue-mid);border-radius:var(--radius2);padding:14px;margin-bottom:12px;}
.sumgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.sumitem{text-align:center;}
.sumnum{font-size:20px;font-weight:900;color:var(--blue);}
.sumlabel{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:1px;}

/* ── COST TOTAL ── */
.costtotal{background:linear-gradient(135deg,var(--blue),var(--blue2));border-radius:var(--radius2);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.ctlabel{font-size:12px;color:rgba(255,255,255,0.8);font-weight:700;}
.ctvalue{font-size:22px;font-weight:900;color:#fff;}
.ctnote{font-size:10px;color:rgba(255,255,255,0.6);margin-top:2px;}

/* ── QUICK CHIPS ── */
.qchips{display:flex;flex-wrap:wrap;gap:7px;}
.qchip{padding:7px 12px;border-radius:20px;border:1.5px solid var(--border2);background:var(--white);color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:var(--shadow);}
.qchip svg{width:18px;height:18px;}
.qchip:active{background:var(--blue-light);border-color:var(--blue);color:var(--blue);}
.freq-section{margin-bottom:10px;}
.freq-title{font-size:11px;font-weight:800;color:#6A1B9A;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px;}

/* ── FILTER TABS ── */
.ftabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px;}
.ftabs::-webkit-scrollbar{display:none;}
.ftab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border2);background:var(--white);color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.ftab.active{background:var(--blue);color:#fff;border-color:var(--blue);}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;}
.empty-icon{font-size:52px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:800;color:var(--text2);}
.empty-sub{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.6;}

/* ── TOAST ── */
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:11px 20px;border-radius:30px;font-weight:800;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,0.18);z-index:999;white-space:nowrap;animation:tIn 0.28s ease;pointer-events:none;}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── MODAL / BOTTOM SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(13,27,62,0.55);z-index:300;display:flex;align-items:flex-end;backdrop-filter:blur(3px);}
.sheet{background:var(--white);border-radius:22px 22px 0 0;padding:22px 18px;width:100%;border-top:3px solid var(--blue);animation:shUp 0.28s ease;max-height:85vh;overflow-y:auto;}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-title{font-size:16px;font-weight:900;margin-bottom:14px;}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px;}
.minp{width:100%;padding:12px 14px;border-radius:11px;border:2px solid var(--border2);background:var(--bg);color:var(--text);font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;outline:none;margin-bottom:12px;}
.minp:focus{border-color:var(--blue);}

/* ── EXPORT SHEET ── */
.exp-opt{display:flex;align-items:center;gap:16px;padding:18px 18px;border-radius:16px;border:1.5px solid var(--border);margin-bottom:10px;cursor:pointer;background:var(--white);transition:all 0.15s;}
.exp-opt:active{background:var(--blue-light);border-color:var(--blue);}
.exp-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.exp-label{font-weight:800;font-size:16px;color:var(--text);}
.exp-sub{font-size:13px;color:var(--muted);margin-top:3px;}

/* ── COLOR PICKER ── */
.cpicker{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.copt{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.15s;}
.copt.selected{border-color:var(--text);transform:scale(1.15);}

/* ── BACK BTN ── */
.backbtn{display:flex;align-items:center;gap:6px;background:var(--blue-light);border:none;color:var(--blue);border-radius:9px;padding:8px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:13px;cursor:pointer;margin-bottom:13px;}

/* ── DONE BANNER ── */
.donebanner{background:linear-gradient(135deg,var(--green),var(--green2));border-radius:var(--radius);padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 12px rgba(27,127,79,0.25);}
.dbtext{flex:1;color:#fff;}
.dbtitle{font-weight:900;font-size:15px;}
.dbsub{font-size:11px;opacity:0.8;margin-top:2px;}
.dbbtn{padding:9px 16px;border-radius:10px;border:none;background:rgba(255,255,255,0.22);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:12px;cursor:pointer;flex-shrink:0;}

/* ── ABOUT ── */
.github-card{background:linear-gradient(135deg,#0D1117,#161B22);border-radius:var(--radius);padding:18px;display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.gha{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#42A5F5);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.ghname{font-size:16px;font-weight:900;color:#fff;}
.ghsub{font-size:12px;color:#8B949E;margin-top:3px;}
.ghbtn{margin-top:8px;padding:8px 16px;border-radius:9px;border:none;background:#238636;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:12px;cursor:pointer;text-decoration:none;display:inline-block;}
.afeat{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text2);}
.afeat:last-child{border-bottom:none;}
.vbadge{display:inline-block;background:var(--blue-light);color:var(--blue);font-size:11px;font-weight:800;border-radius:20px;padding:3px 12px;margin-top:5px;}

/* ── FAB ── */
.fab{position:fixed;bottom:74px;right:16px;width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,var(--blue),var(--blue2));border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 5px 18px rgba(21,101,192,0.42);display:flex;align-items:center;justify-content:center;z-index:150;}
.fab:active{transform:scale(0.92);}

/* ── SETTINGS ── */
.setsec{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin:18px 0 6px 4px;}
.setgroup{background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);margin-bottom:6px;}
.setrow{padding:13px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);cursor:pointer;}
.setrow:last-child{border-bottom:none;}
.setrow:active{background:var(--bg2);}
.seticon{font-size:20px;width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.seticon-blue{background:#E3F2FD;}
.seticon-green{background:#E8F5E9;}
.seticon-red{background:#FFEBEE;}
.seticon-orange{background:#FFF3E0;}
.seticon-purple{background:#F3E5F5;}
.setlabel{font-weight:700;font-size:14px;}
.setsub{font-size:12px;color:var(--muted);margin-top:2px;}
/* Dark mode toggle */
.toggle{width:50px;height:30px;background:var(--border2);border-radius:15px;border:none;cursor:pointer;position:relative;transition:background 0.3s;flex-shrink:0;appearance:none;-webkit-appearance:none;}
.toggle.on{background:#34C759;}
.toggle::after{content:'';position:absolute;width:24px;height:24px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform 0.3s;box-shadow:0 2px 6px rgba(0,0,0,0.2);}
.toggle.on::after{transform:translateX(20px);}

/* ── INSTALL BANNER ── */
.ibanner{background:linear-gradient(135deg,var(--blue-light),#E8EAF6);border:1.5px solid var(--blue-mid);border-radius:var(--radius2);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.ibtext{flex:1;font-size:13px;font-weight:700;}
.ibsub{font-size:11px;color:var(--muted);margin-top:1px;}
.ibbtn{padding:8px 12px;border-radius:9px;border:none;background:var(--blue);color:#fff;font-weight:800;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;white-space:nowrap;}

[data-theme="dark"] .hlogo svg path{stroke:var(--blue);}

};

function doSearch(q){
  if(!q.trim())return[];
  const low=q.toLowerCase().trim();
  // Check alias map first
  const aliasKey=ALIASES[low]||Object.keys(ALIASES).find(a=>low.includes(a)&&a.length>3);
  const resolvedKey=aliasKey?ALIASES[aliasKey]:null;
  const all=allDB();const out=[];
  for(const[key,brands]of Object.entries(all)){
    const keyLow=key.toLowerCase();
    // Match: resolved alias, direct include, starts with, or first char
    const isMatch=
      (resolvedKey&&keyLow===resolvedKey)||
      keyLow.includes(low)||
      low.includes(keyLow)||
      keyLow.startsWith(low[0])||
      (low.length>=3&&keyLow.split(' ').some(w=>w.startsWith(low)));
    if(isMatch){
      brands.forEach(b=>out.push({...b,key}));
    }
  }
  out.sort((a,b)=>(b.pop?1:0)-(a.pop?1:0));
  const seen=new Set();
  return out.filter(r=>{const k=r.b+r.key;if(seen.has(k))return false;seen.add(k);return true;}).slice(0,30);
}

// Price parser
// ── Price & Cost helpers ──
function parsePrice(p){if(!p)return 0;const m=p.match(/[\d.]+/);return m?parseFloat(m[0]):0;}
function calcTotal(items){
  return items.reduce((s,item)=>{
    const u=parsePrice(item.price);
    return s+(u*item.qty);
  },0);
}

          ${item.size?`<span class="chip g">📐 ${h(item.size)}</span>`:''}
          ${item.length?`<span class="chip g">📏 ${h(item.length)}</span>`:''}

          ${item.notes?`<span class="lnotes">"${h(item.notes)}"</span>`:''}

// NAVIGATION & ACTIONS

function go(tab){
  A.tab=tab;A.sel=null;
  render();
  if(tab==='search'){
    requestAnimationFrame(()=>{
      buildSR();
      const el=document.getElementById('SI');
      if(el&&!A.search)el.focus();
    });
  }
}

function onSearch(val){
  A.search=val;A.sel=null;A.cname=val;
  A.suggs=doSearch(val);
  buildSR();
  // update clear btn
  const w=document.querySelector('.swrap');
  if(w){let cb=w.querySelector('.sclear');if(val&&!cb){cb=document.createElement('button');cb.className='sclear';cb.textContent='×';cb.onclick=clearS;w.appendChild(cb);}else if(!val&&cb)cb.remove();}
}

function qs(key){A.search=key;A.sel=null;A.suggs=doSearch(key);A.tab='search';render();requestAnimationFrame(()=>buildSR());}
function clearS(){A.search='';A.suggs=[];A.sel=null;A.cname='';render();requestAnimationFrame(()=>buildSR());}
function selSugg(i){A.sel=A.suggs[i];buildSR();}
function selCustom(i,key){const c=customProds[key][i];if(c)A.sel={...c,key};buildSR();}
function delCustom(key,i){if(customProds[key]){customProds[key].splice(i,1);if(!customProds[key].length)delete customProds[key];saveAll();buildSR();}}

function saveCustom(){
  const name=(document.getElementById('CN')?.value||A.search).trim();
  const brand=(document.getElementById('CB')?.value||'').trim();
  if(!name){toast('⚠️ Enter product name');return;}
  const key=name.toLowerCase();
  const entry={b:brand||'—',c:'Custom',p:'',pop:true,custom:true};
  if(!customProds[key])customProds[key]=[];
  if(!customProds[key].find(c=>c.b.toLowerCase()===(brand||'—').toLowerCase())){customProds[key].unshift(entry);saveAll();toast(`✅ "${name}" saved!`);}
  A.sel={...entry,key};buildSR();
}

// ── Project actions ──
function setFilter(f){A.filter=f;render();}

function addItem(){
  const p=A.sel;if(!p)return;
  const targetId=A.openProjId||projects[0].id;
  const pr=proj(targetId);if(!pr)return;
  const item={id:Date.now().toString(),name:(p.key||'').charAt(0).toUpperCase()+(p.key||'').slice(1)||p.b,key:p.key,brand:p.b,cat:p.c,price:p.p,qty:A.qty,unit:A.unit,notes:A.notes,size:A.size,length:A.length,weight:A.weight,purchased:false};
  pr.items.push(item);
  trackFreq(p.key||item.name.toLowerCase());
  saveAll();
  A.search='';A.suggs=[];A.sel=null;A.qty=1;A.notes='';A.size='';A.length='';A.weight='';
  toast(`✅ ${p.b} ${item.name} added!`);
  A.openProjId=targetId;A.tab='home';render();
}

function chQty(pid,iid,d){const pr=proj(pid);if(!pr)return;const it=pr.items.find(i=>i.id===iid);if(!it)return;it.qty=Math.max(1,it.qty+d);saveAll();render();}
function delItem(pid,iid){const pr=proj(pid);if(!pr)return;pr.items=pr.items.filter(i=>i.id!==iid);saveAll();render();}
function togglePurchased(pid,iid){const pr=proj(pid);if(!pr)return;const it=pr.items.find(i=>i.id===iid);if(!it)return;it.purchased=!it.purchased;saveAll();render();}
function toggleDone(pid){const pr=proj(pid);if(!pr)return;pr.done=!pr.done;saveAll();render();if(pr.done)toast('✅ Project marked Done!');}
function openProject(id){A.openProjId=id;A.filter='All';render();}
function closeProject(){A.openProjId=null;render();}
function clearFreq(){freqItems={};saveAll();toast('🔁 Frequency reset');render();}

function shareAppLink(){
  const txt='🛠️ *MatList Pro* — Smart Materials List for Indian Professionals!\n\nTrack plumbing, electrical & construction materials with brands & quantities.\n\n📲 Open here: https://'+APP.link+'\n\n_Works offline • Free to use_';
  // Try native share first
  if(navigator.share){
    navigator.share({title:'MatList Pro',text:'Smart Materials List App for Indian Professionals',url:'https://'+APP.link}).catch(()=>{});
    return;
  }
  // Fallback: WhatsApp
  var a=document.createElement('a');
  a.href='whatsapp://send?text='+encodeURIComponent(txt);
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){
    var a2=document.createElement('a');
    a2.href='https://wa.me/?text='+encodeURIComponent(txt);
    a2.target='_blank';
    document.body.appendChild(a2);a2.click();document.body.removeChild(a2);
  },1500);
  toast('📲 Sharing...');
}

function openCloneSheet(fromId){
  const targets=projects.filter(p=>p.id!==fromId);
  if(!targets.length){toast('⚠️ Need at least 2 projects to clone');return;}
  showSheet(`
    <div class="sheet-handle"></div>
    <div class="sheet-title">⎘ Clone Items To...</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px">This will copy all items to another project. You can edit after.</div>
    ${targets.map(p=>`<div class="exp-opt" onclick="doClone('${fromId}','${p.id}')">
      <div class="exp-icon pc-${p.color||'blue'}">${p.emoji||'🏠'}</div>
      <div><div class="exp-label">${h(p.name)}</div><div class="exp-sub">${p.items.length} items currently</div></div>
    </div>`).join('')}
    <button class="btn btn-outline btn-lg" onclick="closeSheet()" style="margin-top:6px">Cancel</button>
  `);
}

function doClone(fromId,toId){
  const src=proj(fromId);const dst=proj(toId);if(!src||!dst)return;
  const copies=src.items.map(i=>({...i,id:Date.now().toString()+Math.random().toString(36).slice(2),purchased:false}));
  dst.items=[...dst.items,...copies];
  saveAll();closeSheet();toast(`⎘ ${copies.length} items cloned to ${dst.name}!`);
}

function openNewProjectForm(ptype){openNewProjectSheet();}

function pickColor(c){
  A._newColor=c;
  COLORS.forEach(col=>{const el=document.getElementById('cp_'+col);if(el)el.innerHTML=col===c?'✓':'';});
}

function createProject(){
  const name=document.getElementById('NPName')?.value.trim();
  if(!name){toast('⚠️ Enter a project name');return;}
  const emoji=document.getElementById('NPEmoji')?.value.trim()||'🏠';
  const id='p'+Date.now();
  const ptype=A._newProjType||'material';
  projects.push({id,name,emoji,color:A._newColor||'blue',items:[],done:false,ptype,createdAt:Date.now()});
  saveAll();closeSheet();A.openProjId=id;A.tab='home';render();
}

function confirmDeleteProject(id){
  const p=proj(id);
  showSheet(`
    <div class="sheet-handle"></div>
    <div class="sheet-title">🗑 Delete Project?</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:18px">Delete "<b>${h(p?.name)}</b>" and all ${p?.items.length||0} items? This cannot be undone.</div>
    <div style="display:flex;gap:9px">
      <button class="btn btn-red btn-lg" onclick="deleteProject('${id}')">Yes, Delete</button>
      <button class="btn btn-outline btn-md" onclick="closeSheet()" style="flex-shrink:0;width:auto">Cancel</button>
    </div>
  `);
}

function deleteProject(id){
  if(projects.length<=1){toast('⚠️ Need at least one project');return;}
  projects=projects.filter(p=>p.id!==id);
  if(A.openProjId===id)A.openProjId=null;
  saveAll();closeSheet();render();
}

function doExport(type){
  const p=proj(_exportPid);
  if(!p||!p.items.length){toast('⚠️ No items to export');return;}

  if(type==='wa'){
    const nm=settings.name?'*'+settings.name+'*\n':'';
    const ph=settings.phone?'📞 '+settings.phone+'\n':'';
    let txt='🛠️ *MatList Pro*\n'+nm+ph+'\n📋 *'+p.name+' — Materials List*\n📦 '+p.items.length+' items\n\n';
    p.items.forEach(function(item,i){
      txt+=(i+1)+'. *'+item.name+'* — '+item.brand+'\n';
      txt+='   Qty: '+item.qty+' '+item.unit;
      if(item.size) txt+=' | '+item.size;
      if(item.notes) txt+=' | '+item.notes;
      txt+='\n   '+(item.purchased?'✅ Purchased':'⏳ Pending')+'\n\n';
    });
    txt+='_'+APP.credit()+'_';
    // Try WhatsApp deep link first, fallback to web
    var a=document.createElement('a');
    a.href='whatsapp://send?text='+encodeURIComponent(txt);
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){
      var a2=document.createElement('a');
      a2.href='https://wa.me/?text='+encodeURIComponent(txt);
      a2.target='_blank';
      document.body.appendChild(a2);a2.click();document.body.removeChild(a2);
    },1500);
    toast('💬 Opening WhatsApp...');
    return;
  }

  if(type==='text'){
    var d=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'});
    var txt2='================================\n';
    txt2+='   MATLIST PRO — Materials\n';
    txt2+='================================\n';
    if(settings.name) txt2+='Name  : '+settings.name+'\n';
    if(settings.phone) txt2+='Phone : '+settings.phone+'\n';
    txt2+='Date  : '+d+'\n';
    txt2+='Site  : '+p.name+'\n';
    txt2+='Items : '+p.items.length+'\n';
    txt2+='================================\n\n';
    p.items.forEach(function(item,i){
      txt2+=(i+1)+'. '+item.name+'\n';
      txt2+='   Brand : '+item.brand+'\n';
      txt2+='   Qty   : '+item.qty+' '+item.unit+'\n';
      if(item.size)   txt2+='   Size  : '+item.size+'\n';
      if(item.length) txt2+='   Len   : '+item.length+'\n';
      if(item.weight) txt2+='   Wt    : '+item.weight+'\n';
      if(item.notes)  txt2+='   Note  : '+item.notes+'\n';
      txt2+='   Status: '+(item.purchased?'✅ Purchased':'⏳ Pending')+'\n\n';
    });
    txt2+='================================\n'+APP.credit()+'\n================================';
    // Show text inside app with copy button
    showSheet(
      '<div class="sheet-handle"></div>'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
        '<div class="sheet-title" style="margin:0">📝 Text List</div>'+
        '<button class="btn btn-blue btn-sm" onclick="copyExportText()">📋 Copy All</button>'+
      '</div>'+
      '<textarea id="exportTxt" readonly style="width:100%;height:300px;border:1.5px solid #D4DCF0;border-radius:10px;padding:12px;font-family:monospace;font-size:12px;color:#0D1B3E;background:#F4F7FF;resize:none;line-height:1.6"></textarea>'+
      '<p style="font-size:12px;color:#8A96B0;margin-top:8px;text-align:center">Tap Copy All → paste in WhatsApp / Word / Notes</p>'+
      '<button class="btn btn-outline btn-lg" onclick="closeSheet()" style="margin-top:10px">Close</button>'
    );
    // Set value after sheet renders — avoids any HTML encoding issues
    setTimeout(function(){
      var el=document.getElementById('exportTxt');
      if(el){el.value=txt2;}
    },60);
    return;
  }

  if(type==='pdf'||type==='html'){
    // Build the clean list document first
    var doc=buildListDoc(p, type==='pdf');

    // Try multiple download methods for compatibility across browsers/apps
    var downloaded=false;
    var filename=(p.name+'_list'+(type==='pdf'?'_PDF':'_HTML')+'.html').replace(/\s+/g,'_');
    // Method 1: Blob URL (Chrome, most browsers)
    try{
      var blob=new Blob([doc],{type:'text/html;charset=utf-8'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;a.download=filename;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);},3000);
      downloaded=true;
    }catch(e){downloaded=false;}
    // Method 2: Data URI fallback (Internet browser, Samsung browser, WebView)
    if(!downloaded){
      try{
        var encoded='data:text/html;charset=utf-8,'+encodeURIComponent(doc);
        var a2=document.createElement('a');
        a2.href=encoded;a2.download=filename;
        document.body.appendChild(a2);a2.click();document.body.removeChild(a2);
        downloaded=true;
      }catch(e2){downloaded=false;}
    }

    if(downloaded){
      if(type==='pdf'){
        toast('📄 Downloaded! Open the file → tap Print → Save as PDF');
      } else {
        toast('🌐 HTML file downloaded!');
      }
    } else {
      // APK fallback — show inside app
      showFullPreview(p, type==='pdf', doc);
    }
    return;
  }

function buildListDoc(p, addPrint){
  var d=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'});
  var items=p.items;

  // Check which optional columns have ANY data — only show those
  var hasSize=items.some(function(i){return i.size&&i.size.trim();});
  var hasLength=items.some(function(i){return i.length&&i.length.trim();});
  var hasWeight=items.some(function(i){return i.weight&&i.weight.trim();});
  var hasNotes=items.some(function(i){return i.notes&&i.notes.trim();});

  // Build header row — only include columns that have data
  var thead='<tr>'
    +'<th>#</th>'
    +'<th>Item</th>'
    +'<th>Brand</th>'
    +'<th>Category</th>'
    +'<th>Qty</th>'
    +(hasSize?'<th>Size</th>':'')
    +(hasLength?'<th>Length</th>':'')
    +(hasWeight?'<th>Weight</th>':'')
    +(hasNotes?'<th>Notes</th>':'')
    +'</tr>';

  // Build data rows
  var rows='';
  for(var i=0;i<items.length;i++){
    var item=items[i];
    rows+='<tr style="background:'+(i%2===0?'#ffffff':'#F5F8FF')+'">'
      +'<td>'+(i+1)+'</td>'
      +'<td><b>'+esc(item.name)+'</b></td>'
      +'<td>'+esc(item.brand)+'</td>'
      +'<td>'+esc(item.cat)+'</td>'
      +'<td><b>'+item.qty+'</b> '+esc(item.unit)+'</td>'
      +(hasSize?'<td>'+esc(item.size||'')+'</td>':'')
      +(hasLength?'<td>'+esc(item.length||'')+'</td>':'')
      +(hasWeight?'<td>'+esc(item.weight||'')+'</td>':'')
      +(hasNotes?'<td style="color:#666;font-style:italic">'+esc(item.notes||'')+'</td>':'')
      +'</tr>';
  }

  return '<!DOCTYPE html><html><head><meta charset="UTF-8"/>'
    +'<meta name="viewport" content="width=device-width,initial-scale=1"/>'
    +'<title>'+esc(p.name)+' — Materials List</title>'
    +'<style>'
    +'*{box-sizing:border-box;margin:0;padding:0}'
    +'body{font-family:Arial,sans-serif;padding:24px;color:#0D1B3E;background:#fff;max-width:900px;margin:0 auto}'
    +'.hdr{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:14px;border-bottom:3px solid #1565C0;margin-bottom:16px}'
    +'.logo{font-size:20px;font-weight:900;color:#1565C0}'
    +'.logo-sub{font-size:12px;color:#888;margin-top:3px}'
    +'.ur{text-align:right}'
    +'.un{font-weight:800;font-size:15px}'
    +'.up{font-size:13px;color:#666;margin-top:2px}'
    +'.ud{font-size:11px;color:#aaa;margin-top:3px}'
    +'.pb{background:#E3F2FD;border-radius:8px;padding:12px 16px;margin-bottom:16px}'
    +'.pn{font-size:18px;font-weight:900}'
    +'.pm{font-size:12px;color:#666;margin-top:3px}'
    +'table{width:100%;border-collapse:collapse;font-size:12px}'
    +'th{background:#1565C0;color:#fff;padding:9px 8px;text-align:left;font-weight:700;font-size:11px}'
    +'td{padding:8px;border-bottom:1px solid #E3F2FD;vertical-align:top}'
    +'.ft{margin-top:20px;font-size:10px;color:#bbb;text-align:center;padding-top:10px;border-top:1px solid #eee}'
    +'@media print{body{padding:10px}.no-print{display:none!important}}'
    +'</style>'
    +(addPrint?'<script>window.onload=function(){setTimeout(function(){window.print();},600);}<\/script>':'')
    +'</head><body>'
    +'<div class="hdr">'
    +'<div><div class="logo">🛠️ MatList Pro</div><div class="logo-sub">Materials List</div></div>'
    +'<div class="ur">'
    +(settings.name?'<div class="un">'+esc(settings.name)+'</div>':'')
    +(settings.phone?'<div class="up">'+esc(settings.phone)+'</div>':'')
    +'<div class="ud">'+d+'</div>'
    +'</div>'
    +'</div>'
    +'<div class="pb">'
    +'<div class="pn">'+esc(p.emoji||'🏠')+' '+esc(p.name)+'</div>'
    +'<div class="pm">'+p.items.length+' items &nbsp;•&nbsp; Total qty: '+p.items.reduce(function(s,i){return s+i.qty;},0)+'</div>'
    +'</div>'

}

    };

}
}

// ── HTML escape helper ──
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Unified clipboard helper — used by export text & backup
function copyToClipboard(elId, msg){
  msg=msg||'📋 Copied!';
  var el=document.getElementById(elId);
  if(!el)return;
  var _fallback=function(){
    try{el.select();el.setSelectionRange(0,99999);document.execCommand('copy');toast(msg);}
    catch(e){toast('⚠️ Long press → Select All → Copy');}
  };
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(el.value).then(function(){toast(msg);}).catch(_fallback);
    }else{_fallback();}
  }catch(e){_fallback();}
}
function copyExportText(){copyToClipboard('exportTxt','📋 Copied!');}

function backupData(){
  var data={
    version:APP.version,
    date:new Date().toISOString(),
    projects:projects,
    settings:settings,
    customProds:customProds,
    freqItems:freqItems
  };
  var json=JSON.stringify(data,null,2);
  var date=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}).replace(/ /g,'-');
  var filename='MatListPro_Backup_'+date+'.json';

  // Method 1 — Blob download (Chrome)
  try{
    var blob=new Blob([json],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download=filename;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('📤 Backup saved! Store it safely.');
    return;
  }catch(e){}

  // Method 2 — Show JSON text for manual copy (APK fallback)
  showSheet(
    '<div class="sheet-handle"></div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
      '<div class="sheet-title" style="margin:0">📤 Backup Data</div>'+
      '<button class="btn btn-blue btn-sm" onclick="copyBackupText()">📋 Copy</button>'+
    '</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-bottom:10px">Tap Copy → paste in WhatsApp Saved Messages or Notes to save your backup.</div>'+
    '<textarea id="backupTxt" readonly style="width:100%;height:260px;border:1.5px solid #D4DCF0;border-radius:10px;padding:12px;font-family:monospace;font-size:10px;color:#0D1B3E;background:#F4F7FF;resize:none;line-height:1.5"></textarea>'+
    '<button class="btn btn-outline btn-lg" onclick="closeSheet()" style="margin-top:10px">Close</button>'
  );
  setTimeout(function(){
    var el=document.getElementById('backupTxt');
    if(el) el.value=json;
  },60);
}

function copyBackupText(){copyToClipboard('backupTxt','📋 Backup copied! Paste it somewhere safe.');}

function restoreData(input){
  var file=input.files[0];
  if(!file){return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.projects||!Array.isArray(data.projects)){
        toast('⚠️ Invalid backup file');return;
      }
      showSheet(
        '<div class="sheet-handle"></div>'+
        '<div class="sheet-title">📥 Restore Backup?</div>'+
        '<div style="font-size:14px;color:var(--text2);margin-bottom:8px">Found <b>'+data.projects.length+' projects</b> from <b>'+(data.date?new Date(data.date).toLocaleDateString('en-IN'):'unknown date')+'</b>.</div>'+
        '<div style="font-size:13px;color:var(--red);margin-bottom:18px;background:var(--red-light);border-radius:10px;padding:10px 14px;">⚠️ This will replace your current data. Make sure you have a backup of current data first.</div>'+
        '<div style="display:flex;gap:9px">'+
          '<button class="btn btn-blue btn-lg" onclick="confirmRestore()" style="font-size:14px">✅ Yes, Restore</button>'+
          '<button class="btn btn-outline btn-md" onclick="closeSheet()" style="flex-shrink:0;width:auto">Cancel</button>'+
        '</div>'
      );
      window._pendingRestore=data;
    }catch(ex){
      toast('⚠️ Could not read backup file');
    }
  };
  reader.readAsText(file);
  // Reset input so same file can be picked again
  input.value='';
}

function confirmRestore(){
  var data=window._pendingRestore;
  if(!data){closeSheet();return;}
  projects=data.projects||[];
  settings=data.settings||{name:'',phone:''};
  customProds=data.customProds||{};
  freqItems=data.freqItems||{};
  saveAll();
  closeSheet();
  A.tab='home';A.openProjId=null;
  render();
  toast('✅ Restored '+projects.length+' projects!');
  window._pendingRestore=null;
}

function searchGroceryAll(q){
  if(!q||q.length<1)return[];
  var ql=q.toLowerCase().trim();
  var results=[];
  var customDB=loadCustomGrocery();
  var allDB=GROCERY_DB.concat(customDB);
  allDB.forEach(function(item){
    var score=0;
    var nameMatch=item.en.toLowerCase().includes(ql)||item.ml.includes(q);
    var manglishMatch=item.manglish.some(function(m){return m.toLowerCase().includes(ql);});
    if(nameMatch||manglishMatch){
      if(item.en.toLowerCase()===ql||item.manglish.some(function(m){return m.toLowerCase()===ql;})) score=100;
      else if(item.en.toLowerCase().startsWith(ql)||item.manglish.some(function(m){return m.toLowerCase().startsWith(ql);})) score=80;
      else score=50;
      results.push({item,score});
    }
  });
  results.sort(function(a,b){return b.score-a.score;});
  return results.slice(0,8).map(function(r){return r.item;});
}

// GROCERY — standalone list, own localStorage key
// ════════════════════════════════════════
// Safe localStorage helpers
function getStore(key,def){try{var v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch(e){return def;}}
function setStore(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

function loadGroceryList(){return getStore(APP.groceryKey,[]);}
function saveGroceryList(list){setStore(APP.groceryKey,list);}
function loadCustomGrocery(){return getStore(APP.groceryCustomKey,[]);}
function saveCustomGrocery(list){setStore(APP.groceryCustomKey,list);}
function addToCustomGroceryDB(en,emoji,cat,ml){
  const existing=loadCustomGrocery();
  if(!existing.find(i=>i.en.toLowerCase()===en.toLowerCase())){
    existing.push({en,emoji,cat,ml,manglish:[en.toLowerCase(),ml],custom:true});
    saveCustomGrocery(existing);
  }
}
function loadRecentQtys(){return getStore(APP.groceryQtyKey,[]);}
function saveRecentQty(qty){
  if(!qty||qty==='1')return;
  var list=loadRecentQtys().filter(function(q){return q!==qty;});
  list.unshift(qty);
  if(list.length>5)list=list.slice(0,5);
  setStore(APP.groceryQtyKey,list);
}

function generateGroceryImage(list,d){
  // Build canvas-based grocery list image
  const canvas=document.createElement('canvas');
  const scale=2; // retina
  const W=400,PADX=28,PADY=28,LINE=32,HEADER=80,FOOTER=48;
  const rows=list.length;
  const H=HEADER+rows*LINE+PADY*2+FOOTER+20;
  canvas.width=W*scale;canvas.height=H*scale;
  const ctx=canvas.getContext('2d');
  ctx.scale(scale,scale);
  // Background
  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,W,H);
  // Header bar
  const grad=ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0,'#1565C0');grad.addColorStop(1,'#1976D2');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,HEADER);
  // Header text
  ctx.fillStyle='#fff';
  ctx.font='bold 20px Arial,sans-serif';
  ctx.fillText('🛒 Grocery List',PADX,36);
  ctx.font='13px Arial,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.fillText(d,PADX,58);
  // Items
  list.forEach(function(item,i){
    const y=HEADER+PADY+i*LINE;
    const isEven=i%2===0;
    ctx.fillStyle=isEven?'#F8FBFF':'#fff';
    ctx.fillRect(0,y-20,W,LINE);
    // bullet
    ctx.fillStyle='#1565C0';
    ctx.font='bold 15px Arial,sans-serif';
    ctx.fillText('•',PADX,y);
    // name
    const displayName=item.gml&&item.gml.trim()?item.gml:item.name;
    ctx.fillStyle='#0D1B3E';
    ctx.font='bold 15px Arial,sans-serif';
    ctx.fillText(displayName,PADX+18,y);
    // qty
    if(item.qty&&item.qty!=='1'&&item.qty!==1){
      const qw=ctx.measureText(displayName).width;
      ctx.fillStyle='#1565C0';
      ctx.font='13px Arial,sans-serif';
      ctx.fillText('— '+item.qty,PADX+18+qw+8,y);
    }
    // notes
    if(item.notes){
      ctx.fillStyle='#8A96B0';
      ctx.font='italic 11px Arial,sans-serif';
      ctx.fillText(item.notes,PADX+18,y+13);
    }
  });
  // Divider
  const divY=HEADER+PADY+rows*LINE+8;
  ctx.strokeStyle='#E3F2FD';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PADX,divY);ctx.lineTo(W-PADX,divY);ctx.stroke();
  // Footer
  ctx.fillStyle='#8A96B0';
  ctx.font='11px Arial,sans-serif';
  ctx.fillText(APP.credit(),PADX,divY+20);
  // Download PNG
  try{
    const url=canvas.toDataURL('image/png');
    const a=document.createElement('a');
    a.href=url;a.download='Grocery_List.png';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    toast('🖼️ Image saved! Open Gallery → share to WhatsApp');
    // Also try Web Share API
    setTimeout(function(){
      if(navigator.share&&navigator.canShare){
        canvas.toBlob(function(blob){
          if(!blob)return;
          const file=new File([blob],'Grocery_List.png',{type:'image/png'});
          if(navigator.canShare&&navigator.canShare({files:[file]})){
            navigator.share({files:[file],title:'Grocery List'}).catch(function(){});
          }
        },'image/png');
      }
    },800);
  }catch(e){toast('⚠️ Could not generate image');}
}

    +'<div class="hdr"><div><div class="logo">🛒 Grocery List</div><div class="logo-sub">MatList Pro</div></div>'
    +'<div class="ur">'+(settings.name?'<div class="un">'+esc(settings.name)+'<\/div>':'')+(settings.phone?'<div class="up">'+esc(settings.phone)+'<\/div>':'')+'<div class="ud">'+d+'<\/div><\/div><\/div>'
    +'<table><thead><tr><th>#<\/th><th>Item<\/th><th>Qty<\/th><\/tr><\/thead><tbody>'+rows+'<\/tbody><\/table>'
    +'<div class="ft"><em>'+APP.creditItalic()+'<\/em><\/div>'
    +'<\/body><\/html>';
  var gdownloaded=false;
  try{
    const blob=new Blob([doc],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='Grocery_List.html';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    gdownloaded=true;toast('📄 Downloaded! Open → Print → Save as PDF');
  }catch(e){gdownloaded=false;}
  if(!gdownloaded){try{
    const a2=document.createElement('a');
    a2.href='data:text/html;charset=utf-8,'+encodeURIComponent(doc);
    a2.download='Grocery_List.html';document.body.appendChild(a2);a2.click();document.body.removeChild(a2);
    toast('📄 Downloaded! Open → Print → Save as PDF');gdownloaded=true;
  }catch(e2){}}
  if(!gdownloaded){
    const old=document.getElementById('mlp-preview');if(old)old.remove();
    const ov=document.createElement('div');ov.id='mlp-preview';ov.style.cssText='position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;';
    const tb=document.createElement('div');tb.style.cssText='background:#1B7F4F;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;';
    tb.innerHTML='<span style="color:#fff;font-weight:900;font-size:14px">🛒 Grocery Preview</span><button id="closeBtn" style="background:#fff;border:none;color:#1B7F4F;border-radius:8px;padding:8px 14px;font-weight:800;font-size:13px;cursor:pointer">✕ Close</button>';
    const ifr=document.createElement('iframe');ifr.style.cssText='flex:1;border:none;width:100%;background:#fff;';ifr.setAttribute('srcdoc',doc);
    ov.appendChild(tb);ov.appendChild(ifr);document.body.appendChild(ov);
    document.getElementById('closeBtn').onclick=()=>{const el=document.getElementById('mlp-preview');if(el)el.remove();};
  }
}

// DARK MODE
// ════════════════════════════════════════
var darkMode=false;
function initDark(){
  var saved=localStorage.getItem(APP.darkKey);
  darkMode=saved==='1'; // default is light (false)
  applyDark();
}
function applyDark(){
  document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
  var m=document.querySelector('meta[name="theme-color"]');
  if(m) m.content=darkMode?'#000000':'#1565C0';
}
function toggleDark(){
  darkMode=!darkMode;
  localStorage.setItem(APP.darkKey,darkMode?'1':'0');
  applyDark();
  render();
}
initDark();

loadAll();
// Apply default tab from settings
A.tab=settings.defaultTab||'home';
render();
